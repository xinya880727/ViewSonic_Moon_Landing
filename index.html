<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apollo 11 : Moon Landing</title>
  
  <!-- 引入 Google 的 model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <!-- 引入 Three.js 核心與轉換工具，用於在背景動態縮小與置中模型 -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      
      /* --- 背景圖設定 --- */
      background-image: url('bg_1920x1080.jpg'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #05050a;
      
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
      background-color: transparent;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
      color: white;
      z-index: 10;
      pointer-events: none; 
      text-align: center;
    }
    .header h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .header p {
      margin: 0;
      font-size: 14px;
      color: #e0e0e0;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .ar-button {
      background-color: white;
      color: black;
      border: none;
      border-radius: 50px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: bold;
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .ar-button:active {
      transform: translateX(-50%) scale(0.95);
    }
    .ar-button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>✨ 探索自訂 AR 模型</h1>
    <p>雙指捏合可縮放，拖曳可旋轉。使用手機瀏覽並點擊下方按鈕即可投影至現實世界！</p>
  </div>

  <model-viewer 
    id="my-viewer"
    alt="我的 3D 模型"
    ar 
    ar-scale="fixed"
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    auto-rotate
    shadow-intensity="1.5"
    environment-image="neutral"
    exposure="1.2">
    
    <button slot="ar-button" class="ar-button" id="ar-btn" disabled>
      <span class="btn-text">⏳ 模型處理中...</span>
    </button>
  </model-viewer>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
    import { USDZExporter } from 'three/addons/exporters/USDZExporter.js';

    // ==========================================
    // ⚙️ 設定檔案名稱與縮小倍率
    // ==========================================
    const modelFileName = 'Moon.glb'; 
    const scaleFactor = 0.1;          
    // ==========================================

    const viewer = document.getElementById('my-viewer');
    const arBtn = document.getElementById('ar-btn');
    const btnText = arBtn.querySelector('.btn-text');

    const loader = new GLTFLoader();
    loader.load(modelFileName, async (gltf) => {
      const originalScene = gltf.scene;
      
      // 🎯 核心魔法升級：使用「Wrapper (包裝)」法解決置中與縮放問題
      
      // 1. 計算原始模型的整體包圍盒與中心點
      const box = new THREE.Box3().setFromObject(originalScene);
      const center = box.getCenter(new THREE.Vector3());

      // 2. 建立一個全新的根場景 (Wrapper)
      // 這樣做可以避免 AR 系統強制忽略根節點(Root)縮放與位移的 Bug
      const rootScene = new THREE.Scene();
      
      // 將原本的模型加入這個新的根場景中，它會變成子節點
      rootScene.add(originalScene);

      // 3. 置中修正：將原始模型反向位移，扣除中心點座標
      // 這會讓模型的幾何中心完美對齊原點 (0,0,0)，徹底解決自轉軸偏心的問題！
      originalScene.position.sub(center);

      // 4. 縮放修正：對子節點進行實體縮放
      originalScene.scale.set(scaleFactor, scaleFactor, scaleFactor);

      // 匯出成新的 GLB 給網頁與 Android (注意：我們匯出的是包裝好的 rootScene)
      const gltfExporter = new GLTFExporter();
      gltfExporter.parse(rootScene, async (newGltf) => {
        const glbBlob = new Blob([newGltf], { type: 'application/octet-stream' });
        const glbUrl = URL.createObjectURL(glbBlob);
        
        viewer.src = glbUrl;

        // 自動生出 iOS 專用的 USDZ
        try {
          const usdzExporter = new USDZExporter();
          const usdzData = await usdzExporter.parse(rootScene);
          const usdzBlob = new Blob([usdzData], { type: 'model/vnd.usdz+zip' });
          viewer.setAttribute('ios-src', URL.createObjectURL(usdzBlob));
        } catch (e) {
          console.warn('iOS USDZ 轉換失敗', e);
        }

        // 開放 AR 按鈕
        arBtn.disabled = false;
        btnText.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          啟動 AR 模式
        `;

      }, (error) => {
        console.error('縮小 GLB 失敗', error);
        btnText.innerText = '模型處理失敗';
      }, { binary: true });

    }, undefined, (error) => {
      console.error('載入原始模型失敗，請確認 Moon.glb 檔案是否存在', error);
      btnText.innerText = '找不到模型檔案';
    });
  </script>

</body>
</html>
